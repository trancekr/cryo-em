<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryo-EM Sample Preparation &amp; Quality Assessment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f0f0f5;
  font-family: 'Inter', -apple-system, sans-serif;
  color: #1a1a2e;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 16px;
  overflow: hidden;
}
#app {
  max-width: 1800px;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.header {
  flex-shrink: 0;
  text-align: center;
  padding: 4px 0 2px;
  position: relative;
}
.home-btn {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  display: flex; align-items: center; gap: 4px;
  padding: clamp(4px, 0.5vh, 8px) clamp(10px, 1.2vw, 16px);
  border-radius: 20px; border: 2px solid #e0e0e8; background: #fff;
  color: #666; font-size: clamp(12px, 1.4vh, 17px); font-weight: 700;
  text-decoration: none; transition: all 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.home-btn:hover { background: #f5f3ff; color: #7c3aed; border-color: #c4b5fd; }
.header h1 { font-size: clamp(24px, 3vh, 38px); font-weight: 900; color: #1a1a2e; letter-spacing: -0.5px; }
.header p { font-size: clamp(12px, 1.4vh, 18px); color: #777; margin-top: 2px; font-weight: 500; }

.content {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-rows: 40fr 60fr;
  gap: clamp(8px, 1vh, 14px);
  padding: clamp(4px, 0.5vh, 8px) 0;
}

.row2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(8px, 1vh, 14px);
  min-height: 0;
}

.panel {
  background: #fff;
  border: 2px solid #e0e0e8;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.panel:hover { border-color: #c4b5fd; }

.panel-header {
  padding: clamp(6px, 0.8vh, 12px) clamp(10px, 1vw, 16px);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  border-bottom: 1.5px solid #f0f0f5;
}
.panel-dot {
  width: clamp(8px, 1vh, 12px);
  height: clamp(8px, 1vh, 12px);
  border-radius: 50%;
  flex-shrink: 0;
}
.panel-title {
  font-size: clamp(13px, 1.5vh, 19px);
  font-weight: 800;
  letter-spacing: -0.3px;
}

.panel-canvas {
  flex: 1; min-height: 0;
}
.panel-canvas canvas {
  display: block;
  width: 100%;
  height: 100%;
}

.footer {
  flex-shrink: 0;
  text-align: center;
  padding: 2px 8px;
  font-size: clamp(8px, 0.9vh, 11px);
  color: #aaa;
}

@media (max-width: 900px) {
  .content { grid-template-rows: 1fr 1fr 1fr; }
  .row2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <a class="home-btn" href="./">&larr; Home</a>
    <h1>Sample Preparation &amp; Quality Assessment</h1>
    <p>Ensuring sample quality before grid preparation</p>
  </div>

  <div class="content">
    <!-- Row 1: Sample Homogeneity (full width, 40%) -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-dot" style="background:#f59e0b"></div>
        <div class="panel-title">Sample Homogeneity Assessment</div>
      </div>
      <div class="panel-canvas"><canvas id="cvHomog"></canvas></div>
    </div>

    <!-- Row 2: Neg Stain vs Cryo-EM (left) + Requirements (right) -->
    <div class="row2">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot" style="background:#8b5cf6"></div>
          <div class="panel-title">Negative Stain vs. Cryo-EM</div>
        </div>
        <div class="panel-canvas"><canvas id="cvCompare"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot" style="background:#10b981"></div>
          <div class="panel-title">Sample Requirements for SPA</div>
        </div>
        <div class="panel-canvas"><canvas id="cvReqs"></canvas></div>
      </div>
    </div>
  </div>
  <div class="footer">Dubochet et al., Q Rev Biophys (1988) &middot; Passmore &amp; Russo, Methods Enzymol (2016)</div>
</div>

<script>
function setupCanvas(id) {
    const c = document.getElementById(id);
    const rect = c.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    c.width = Math.round(rect.width * dpr);
    c.height = Math.round(rect.height * dpr);
    const ctx = c.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx, w: rect.width, h: rect.height };
}

/* Font size helper — proportional to canvas height with clamped range */
function F(h, level) {
    switch(level) {
        case 'xl': return Math.round(Math.min(Math.max(h * 0.075, 14), 30));
        case 'lg': return Math.round(Math.min(Math.max(h * 0.06, 12), 24));
        case 'md': return Math.round(Math.min(Math.max(h * 0.05, 11), 20));
        case 'sm': return Math.round(Math.min(Math.max(h * 0.04, 10), 16));
    }
}

// ===== Panel 1: Sample Homogeneity Assessment =====
function drawHomogeneity() {
    const { ctx, w, h } = setupCanvas('cvHomog');

    const methods = [
        { name: 'SEC', color: '#f59e0b', desc: 'Separate by size\nSingle peak = good' },
        { name: 'SEC-MALS', color: '#ef4444', desc: 'UV + MW overlay\nAbsolute MW check' },
        { name: 'DLS', color: '#3b82f6', desc: 'Narrow = good\nHydrodynamic radius' },
        { name: 'Mass Photometry', color: '#10b981', desc: 'Single-molecule MW\nfrom light scattering' },
    ];

    // Layout calculation: compute positions from available space
    const pad = Math.max(w * 0.015, 8);
    const cardW = (w - pad * 5) / 4;
    const titleFs = F(h, 'lg');
    const descFs = F(h, 'md');
    const gap = Math.max(h * 0.04, 6);

    // Sequential layout: title → gap → graph → axis labels → graphDescGap → description
    const titleH = titleFs + 4;
    const descLineH = descFs + 4;
    const descH = descLineH * 2;
    const axisLabelH = F(h, 'sm');
    const graphDescGap = Math.max(h * 0.06, 10); // dedicated gap between graph and description
    const graphH = h - pad * 2 - titleH - gap - descH - axisLabelH - graphDescGap;
    const titleY = pad;
    const graphY = pad + titleH + gap;
    const descY = graphY + Math.max(graphH, 30) + axisLabelH + graphDescGap;

    methods.forEach((m, i) => {
        const x0 = pad + i * (cardW + pad);
        const cx = x0 + cardW / 2;

        // Card bg
        ctx.fillStyle = m.color + '08';
        ctx.strokeStyle = m.color + '30';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(x0, pad * 0.5, cardW, h - pad, 8); ctx.fill(); ctx.stroke();

        // Name
        ctx.fillStyle = m.color;
        ctx.font = `800 ${titleFs}px Inter,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(m.name, cx, titleY);
        ctx.textBaseline = 'alphabetic';

        // Graph area
        const gw = cardW * 0.82;
        const gx = x0 + (cardW - gw) / 2;
        const gh = Math.max(graphH, 30);

        // Axes
        const axFs = Math.max(F(h, 'sm') - 2, 8);
        ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(gx, graphY); ctx.lineTo(gx, graphY + gh); ctx.lineTo(gx + gw, graphY + gh); ctx.stroke();

        // Y-axis label (rotated) — per technique
        const yLabels = ['A₂₈₀', 'A₂₈₀', 'Intensity', 'Counts'];
        ctx.save();
        ctx.fillStyle = '#999'; ctx.font = `500 ${axFs}px Inter`;
        ctx.translate(gx - axFs * 0.6, graphY + gh / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.fillText(yLabels[i], 0, 0);
        ctx.restore();

        if (i === 0) {
            // SEC chromatogram — good peak
            ctx.strokeStyle = m.color; ctx.lineWidth = 2.5;
            ctx.beginPath();
            for (let t = 0; t <= 1; t += 0.01) {
                const px = gx + t * gw;
                const peak = Math.exp(-Math.pow((t - 0.55) / 0.08, 2));
                const py = graphY + gh - peak * gh * 0.85;
                t === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.stroke();
            // Bad example (dashed)
            ctx.strokeStyle = m.color + '40'; ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            for (let t = 0; t <= 1; t += 0.01) {
                const px = gx + t * gw;
                const p1 = Math.exp(-Math.pow((t - 0.4) / 0.07, 2)) * 0.5;
                const p2 = Math.exp(-Math.pow((t - 0.6) / 0.08, 2)) * 0.6;
                const py = graphY + gh - (p1 + p2) * gh * 0.85;
                t === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.stroke();
            ctx.setLineDash([]);
            // X-axis label
            ctx.fillStyle = '#999'; ctx.font = `500 ${axFs}px Inter`;
            ctx.textAlign = 'center';
            ctx.fillText('Elution volume', gx + gw / 2, graphY + gh + axFs + 2);
        } else if (i === 1) {
            // SEC-MALS — chromatogram + MW line
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2.5;
            ctx.beginPath();
            for (let t = 0; t <= 1; t += 0.01) {
                const px = gx + t * gw;
                const peak = Math.exp(-Math.pow((t - 0.5) / 0.1, 2));
                const py = graphY + gh - peak * gh * 0.85;
                t === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.stroke();
            // MW line (horizontal)
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
            ctx.setLineDash([5, 3]);
            const mwY = graphY + gh * 0.3;
            ctx.beginPath(); ctx.moveTo(gx + gw * 0.25, mwY); ctx.lineTo(gx + gw * 0.75, mwY); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#3b82f6';
            ctx.font = `700 ${axFs}px Inter`;
            ctx.textAlign = 'right';
            ctx.fillText('MW', gx + gw * 0.22, mwY + 4);
            // X-axis label
            ctx.fillStyle = '#999'; ctx.font = `500 ${axFs}px Inter`;
            ctx.textAlign = 'center';
            ctx.fillText('Elution volume', gx + gw / 2, graphY + gh + axFs + 2);
        } else if (i === 2) {
            // DLS — smooth intensity distribution vs hydrodynamic diameter (log scale)
            // Good: narrow single peak at ~10nm
            ctx.strokeStyle = m.color; ctx.lineWidth = 2.5;
            ctx.beginPath();
            for (let t = 0; t <= 1; t += 0.005) {
                const px = gx + t * gw;
                const logD = t * 3; // log10(diameter) from 1nm to 1000nm
                const peak = Math.exp(-Math.pow((logD - 1.0) / 0.15, 2));
                const py = graphY + gh - peak * gh * 0.82;
                t === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.stroke();
            // Fill under curve
            ctx.fillStyle = m.color + '20';
            ctx.lineTo(gx + gw, graphY + gh); ctx.lineTo(gx, graphY + gh); ctx.closePath(); ctx.fill();
            // Bad: broad/multi-peak (dashed)
            ctx.strokeStyle = m.color + '50'; ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            for (let t = 0; t <= 1; t += 0.005) {
                const px = gx + t * gw;
                const logD = t * 3;
                const p1 = Math.exp(-Math.pow((logD - 0.8) / 0.2, 2)) * 0.45;
                const p2 = Math.exp(-Math.pow((logD - 1.8) / 0.3, 2)) * 0.35;
                const py = graphY + gh - (p1 + p2) * gh * 0.82;
                t === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.stroke(); ctx.setLineDash([]);
            // X-axis labels (log scale)
            ctx.fillStyle = '#999'; ctx.font = `500 ${axFs}px Inter`;
            ctx.textAlign = 'center';
            ['1', '10', '100', '1k'].forEach((lbl, li) => {
                ctx.fillText(lbl, gx + (li / 3) * gw, graphY + gh + axFs + 2);
            });
            ctx.fillText('nm', gx + gw * 1.06, graphY + gh + axFs + 2);
        } else {
            // Mass Photometry — scatter dots + Gaussian histogram peaks
            const peaks = [
                { center: 0.25, sigma: 0.04, amp: 1.0, label: '66' },
                { center: 0.50, sigma: 0.04, amp: 0.35, label: '132' },
                { center: 0.75, sigma: 0.05, amp: 0.1, label: '198' },
            ];
            // Filled histogram curve
            ctx.fillStyle = m.color + '25';
            ctx.strokeStyle = m.color; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(gx, graphY + gh);
            for (let t = 0; t <= 1; t += 0.005) {
                let y = 0;
                peaks.forEach(p => { y += p.amp * Math.exp(-Math.pow((t - p.center) / p.sigma, 2)); });
                ctx.lineTo(gx + t * gw, graphY + gh - y * gh * 0.75);
            }
            ctx.lineTo(gx + gw, graphY + gh); ctx.closePath(); ctx.fill();
            // Stroke the curve
            ctx.beginPath();
            for (let t = 0; t <= 1; t += 0.005) {
                let y = 0;
                peaks.forEach(p => { y += p.amp * Math.exp(-Math.pow((t - p.center) / p.sigma, 2)); });
                const py = graphY + gh - y * gh * 0.75;
                t === 0 ? ctx.moveTo(gx, py) : ctx.lineTo(gx + t * gw, py);
            }
            ctx.stroke();
            // Scatter dots (individual landing events)
            peaks.forEach(p => {
                const nDots = Math.round(p.amp * 15);
                for (let d = 0; d < nDots; d++) {
                    const dx = gx + (p.center + (Math.random() - 0.5) * p.sigma * 3) * gw;
                    const dy = graphY + gh * 0.1 + Math.random() * gh * 0.3;
                    ctx.fillStyle = m.color + '40';
                    ctx.beginPath(); ctx.arc(dx, dy, 1.5, 0, Math.PI * 2); ctx.fill();
                }
            });
            // X-axis MW labels
            ctx.fillStyle = '#999'; ctx.font = `500 ${axFs}px Inter`;
            ctx.textAlign = 'center';
            peaks.forEach(p => { ctx.fillText(p.label, gx + p.center * gw, graphY + gh + axFs + 2); });
            ctx.fillText('kDa', gx + gw * 1.04, graphY + gh + axFs + 2);
        }

        // Description — always below graph with guaranteed gap
        ctx.fillStyle = '#444';
        ctx.font = `600 ${descFs}px Inter,sans-serif`;
        ctx.textAlign = 'center';
        m.desc.split('\n').forEach((ln, li) => {
            ctx.fillText(ln, cx, descY + li * descLineH);
        });
    });
}

// ===== Panel 2: Negative Stain vs Cryo-EM =====
// Pre-load micrograph images (Passmore LA & Russo CJ, Methods Enzymol, 2016)
const _negStainImg = new Image();
_negStainImg.src = 'neg-stain-passmore2016.jpg';
const _cryoEmImg = new Image();
_cryoEmImg.src = 'cryo-em-passmore2016.jpg';

function drawCompare(negImg, cryoImg) {
    const { ctx, w, h } = setupCanvas('cvCompare');
    const pad = Math.max(h * 0.04, 8);
    const colW = (w - pad * 3) / 2;

    const cols = [
        { label: 'Negative Stain', color: '#f59e0b', bg: '#fffbeb', img: negImg,
          items: ['Heavy metal stain coating', 'Resolution: ~15–25 Å', 'Surface topology only', 'Quick screening (min)', 'Dehydration artifacts'] },
        { label: 'Cryo-EM', color: '#3b82f6', bg: '#eff6ff', img: cryoImg,
          items: ['Vitrified native state', 'Resolution: ~2–4 Å', 'Internal structure visible', 'Data collection (hrs–days)', 'Near-native conformation'] },
    ];

    // Layout: label → image → gap → bullet list → citation
    const labelFs = F(h, 'lg');
    const itemFs = F(h, 'md');
    const labelH = labelFs + 8;
    const itemLineH = itemFs + 8;
    const listH = itemLineH * cols[0].items.length;
    const imgGap = pad * 1.5;
    // Cap image height: give more room to bullets, max 42% of panel height
    const availH = h - pad * 2 - labelH - listH - imgGap - pad;
    const imgH = Math.min(Math.max(availH, h * 0.15), h * 0.42);
    const labelY = pad;
    const imgY = labelY + labelH + pad * 0.3;
    const listY = imgY + imgH + imgGap;

    for (let c = 0; c < 2; c++) {
        const col = cols[c];
        const x0 = pad + c * (colW + pad);

        // Background
        ctx.fillStyle = col.bg;
        ctx.beginPath(); ctx.roundRect(x0, pad * 0.5, colW, h - pad, 10); ctx.fill();
        ctx.strokeStyle = col.color + '40'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(x0, pad * 0.5, colW, h - pad, 10); ctx.stroke();

        // Label
        ctx.fillStyle = col.color;
        ctx.font = `800 ${labelFs}px Inter,sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(col.label, x0 + colW / 2, labelY + labelFs);

        // Micrograph image from Passmore & Russo 2016
        const imgW = colW * 0.82;
        const imgX = x0 + (colW - imgW) / 2;

        // Draw image clipped to rounded rect
        ctx.save();
        ctx.beginPath(); ctx.roundRect(imgX, imgY, imgW, imgH, 6); ctx.clip();
        if (col.img && col.img.complete && col.img.naturalWidth > 0) {
            // Cover-fit: scale to fill, center crop
            const srcAR = col.img.naturalWidth / col.img.naturalHeight;
            const dstAR = imgW / imgH;
            let sx = 0, sy = 0, sw = col.img.naturalWidth, sh = col.img.naturalHeight;
            if (srcAR > dstAR) {
                sw = col.img.naturalHeight * dstAR;
                sx = (col.img.naturalWidth - sw) / 2;
            } else {
                sh = col.img.naturalWidth / dstAR;
                sy = (col.img.naturalHeight - sh) / 2;
            }
            ctx.drawImage(col.img, sx, sy, sw, sh, imgX, imgY, imgW, imgH);
        } else {
            // Fallback: gray placeholder
            ctx.fillStyle = c === 0 ? '#1a1a1a' : '#888';
            ctx.fillRect(imgX, imgY, imgW, imgH);
            ctx.fillStyle = '#aaa'; ctx.font = `500 ${F(h,'sm')}px Inter`;
            ctx.textAlign = 'center';
            ctx.fillText('Loading...', imgX + imgW/2, imgY + imgH/2);
        }
        ctx.restore();

        // Thin border around image
        ctx.strokeStyle = col.color + '50'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(imgX, imgY, imgW, imgH, 6); ctx.stroke();

        // Bullet points
        ctx.textAlign = 'left';
        col.items.forEach((item, j) => {
            const iy = listY + j * itemLineH;
            ctx.fillStyle = col.color;
            ctx.font = `700 ${itemFs}px Inter`;
            ctx.fillText('•', x0 + pad, iy);
            ctx.fillStyle = '#333';
            ctx.font = `500 ${itemFs}px Inter`;
            ctx.fillText(item, x0 + pad + itemFs, iy);
        });
    }

    // VS divider
    const vsR = Math.max(h * 0.035, 12);
    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#e0e0e8'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(w / 2, imgY + imgH / 2, vsR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#999'; ctx.font = `800 ${Math.round(vsR * 0.9)}px Inter`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('vs', w / 2, imgY + imgH / 2);
    ctx.textBaseline = 'alphabetic';

}

// ===== Panel 3: Sample Requirements =====
function drawRequirements() {
    const { ctx, w, h } = setupCanvas('cvReqs');
    const pad = Math.max(h * 0.04, 8);

    // Top summary banner
    const bannerH = Math.round(h * 0.13);
    const bannerFs = F(h, 'lg');
    ctx.fillStyle = '#f0fdf4';
    ctx.beginPath(); ctx.roundRect(pad, pad * 0.5, w - pad * 2, bannerH, 8); ctx.fill();
    ctx.strokeStyle = '#10b98140'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(pad, pad * 0.5, w - pad * 2, bannerH, 8); ctx.stroke();
    ctx.fillStyle = '#166534'; ctx.font = `700 ${bannerFs}px Inter`;
    ctx.textAlign = 'center';
    ctx.fillText('Purity >95%  ·  1–5 mg/mL  ·  >80 kDa  ·  Fresh prep', w / 2, pad * 0.5 + bannerH * 0.65);

    // 3-column detailed table below
    const tableY = pad * 0.5 + bannerH + pad * 0.8;
    const tableH = h - tableY - pad * 0.5;
    const colW = (w - pad * 4) / 3;
    const hdrFs = F(h, 'md');
    const tFs = F(h, 'sm');
    const hdrH = hdrFs + 10;

    const cols = [
        { title: 'Size & Shape', color: '#f59e0b',
          rows: [
            { text: '>150 kDa: straightforward', bold: true },
            { text: '80–150 kDa: feasible' },
            { text: '50–80 kDa: use scaffold' },
            { text: '<50 kDa: challenging but feasible' },
            { text: 'Asymmetric shape helps' },
            { text: 'Purity >95% by SEC' },
          ] },
        { title: 'Concentration', color: '#3b82f6',
          rows: [
            { text: '1–5 mg/mL stock', bold: true },
            { text: '~50 nM – 5 μM on grid' },
            { text: '3–4 μL per grid (Vitrobot)' },
            { text: 'Freshly purified (hours)' },
            { text: 'Neg stain screen first' },
            { text: 'Optimize conc. empirically' },
          ] },
        { title: 'Buffer & Limits', color: '#10b981',
          rows: [
            { text: 'HEPES/Tris pH 7–8', bold: true },
            { text: 'NaCl ≤300 mM' },
            { text: 'Glycerol <5%' },
            { text: 'DMSO <0.5%' },
            { text: 'Detergent ≤2× CMC' },
            { text: 'No sucrose/PEG' },
          ] },
    ];

    const tLineH = (tableH - hdrH - pad) / cols[0].rows.length;

    cols.forEach((col, ci) => {
        const x0 = pad + ci * (colW + pad);

        // Column card
        ctx.fillStyle = col.color + '08';
        ctx.strokeStyle = col.color + '30'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(x0, tableY, colW, tableH, 8); ctx.fill(); ctx.stroke();

        // Header
        ctx.fillStyle = col.color + '18';
        ctx.beginPath(); ctx.roundRect(x0, tableY, colW, hdrH, [8, 8, 0, 0]); ctx.fill();
        ctx.fillStyle = col.color;
        ctx.font = `800 ${hdrFs}px Inter`;
        ctx.textAlign = 'center';
        ctx.fillText(col.title, x0 + colW / 2, tableY + hdrH * 0.72);

        // Row items
        ctx.textAlign = 'left';
        col.rows.forEach((row, ri) => {
            const ry = tableY + hdrH + pad * 0.3 + ri * tLineH;
            ctx.fillStyle = col.color;
            ctx.font = `700 ${tFs}px Inter`;
            ctx.fillText('•', x0 + pad * 0.6, ry + tFs);
            ctx.fillStyle = row.bold ? '#111' : '#333';
            ctx.font = `${row.bold ? 700 : 500} ${tFs}px Inter`;
            ctx.fillText(row.text, x0 + pad * 0.6 + tFs * 0.8, ry + tFs);
        });
    });
}

function renderAll() {
    drawHomogeneity();
    drawCompare(_negStainImg, _cryoEmImg);
    drawRequirements();
}

// Wait for micrograph images to load, then render
const _allImgs = [_negStainImg, _cryoEmImg];
let _imgsLoaded = 0;
function _onImgLoad() {
    _imgsLoaded++;
    if (_imgsLoaded >= _allImgs.length) renderAll();
}
_allImgs.forEach(img => { img.onload = _onImgLoad; });
if (_allImgs.every(i => i.complete)) { _imgsLoaded = _allImgs.length; renderAll(); }
setTimeout(() => { if (_imgsLoaded < _allImgs.length) renderAll(); }, 500);

window.addEventListener('resize', () => {
    clearTimeout(window._rt);
    window._rt = setTimeout(renderAll, 150);
});
</script>
</body>
</html>
