<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryo-EM Grid Structure & Materials</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f0f0f5;
  font-family: 'Inter', -apple-system, sans-serif;
  color: #1a1a2e;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 16px;
  overflow: hidden;
}
#app {
  max-width: 1800px;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}
.header {
  flex-shrink: 0;
  text-align: center;
  padding: 4px 0 2px;
  position: relative;
}
.home-btn {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  display: flex; align-items: center; gap: 4px;
  padding: clamp(4px, 0.5vh, 8px) clamp(10px, 1.2vw, 16px);
  border-radius: 20px; border: 2px solid #e0e0e8; background: #fff;
  color: #666; font-size: clamp(12px, 1.4vh, 17px); font-weight: 700;
  text-decoration: none; transition: all 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.home-btn:hover { background: #f5f3ff; color: #7c3aed; border-color: #c4b5fd; }
.header h1 { font-size: clamp(24px, 3vh, 38px); font-weight: 900; color: #1a1a2e; letter-spacing: -0.5px; }
.header p { font-size: clamp(12px, 1.4vh, 18px); color: #777; margin-top: 2px; font-weight: 500; }

.canvas-wrap {
  flex: 1; min-height: 0;
  background: #fff;
  border: 2px solid #e0e0e8;
  border-radius: 14px;
  overflow: hidden;
  margin: clamp(4px, 0.5vh, 8px) 0;
}
.canvas-wrap canvas { display: block; width: 100%; height: 100%; }

.footer {
  flex-shrink: 0;
  text-align: center;
  padding: 2px 0;
  font-size: clamp(9px, 1vh, 12px);
  color: #aaa;
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <a class="home-btn" href="./">&larr; Home</a>
    <h1>Cryo-EM Grid Structure &amp; Materials</h1>
    <p>3 mm disc with microscale mesh and nanoscale holes for sample support</p>
  </div>
  <div class="canvas-wrap"><canvas id="cv"></canvas></div>
  <div class="footer">
    Grassucci et al. (2007) Nat Protoc &middot; Passmore &amp; Russo (2016) Methods Enzymol
  </div>
</div>

<script>
const dpr = window.devicePixelRatio || 1;

function initCanvas(id) {
  const c = document.getElementById(id);
  const p = c.parentElement;
  const w = p.clientWidth, h = p.clientHeight;
  c.width = w * dpr; c.height = h * dpr;
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, w, h };
}

function F(h, level) {
  switch(level) {
    case 'xl': return Math.round(Math.min(Math.max(h * 0.055, 20), 40));
    case 'lg': return Math.round(Math.min(Math.max(h * 0.042, 17), 32));
    case 'md': return Math.round(Math.min(Math.max(h * 0.034, 15), 26));
    case 'sm': return Math.round(Math.min(Math.max(h * 0.028, 13), 22));
    case 'xs': return Math.round(Math.min(Math.max(h * 0.024, 12), 18));
  }
}

function roundRect(ctx, x, y, w, h, r) {
  if (Array.isArray(r)) {
    ctx.beginPath();
    ctx.moveTo(x + r[0], y); ctx.lineTo(x + w - r[1], y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    ctx.lineTo(x + w, y + h - r[2]);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    ctx.lineTo(x + r[3], y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    ctx.lineTo(x, y + r[0]);
    ctx.quadraticCurveTo(x, y, x + r[0], y);
    ctx.closePath();
  } else {
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }
}

function draw() {
  const { ctx, w, h } = initCanvas('cv');
  const xl = F(h, 'xl'), lg = F(h, 'lg'), md = F(h, 'md'), sm = F(h, 'sm'), xs = F(h, 'xs');
  const pad = Math.max(w * 0.02, 12);

  // ── Top Section: 3-level zoom diagram ──
  const zoomH = h * 0.52;
  const colW = w / 3;

  // Section title
  ctx.fillStyle = '#4338ca'; ctx.font = `800 ${lg}px Inter`; ctx.textAlign = 'center';
  ctx.fillText('Grid → Square → Hole', w / 2, pad + lg);
  const startY = pad + lg + 12;
  const cy = startY + (zoomH - startY - md * 2 - sm - 16) / 2;

  // Uniform shape size for all three
  const shapeR = Math.min(colW * 0.22, (zoomH - startY) * 0.3);
  // Common label Y positions (aligned across all 3)
  const labelY1 = cy + shapeR + md + 8;    // "Grid" / "Square" / "Hole"
  const labelY2 = labelY1 + sm + 4;         // "⌀ 3 mm" / "~50 μm" / "1–2 μm"

  // ── Level 1: Full Grid (circle with crosshatch) ──
  const gx = colW * 0.5;

  ctx.fillStyle = '#e0e7ff'; ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(gx, cy, shapeR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = '#a5b4fc'; ctx.lineWidth = 0.8;
  for (let i = -5; i <= 5; i++) {
    const off = (i / 5) * shapeR * 0.9;
    const xlen = Math.sqrt(Math.max(0, shapeR * shapeR - off * off));
    ctx.beginPath(); ctx.moveTo(gx - xlen, cy + off); ctx.lineTo(gx + xlen, cy + off); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx + off, cy - xlen); ctx.lineTo(gx + off, cy + xlen); ctx.stroke();
  }

  ctx.fillStyle = '#4338ca'; ctx.font = `800 ${md}px Inter`; ctx.textAlign = 'center';
  ctx.fillText('Grid', gx, labelY1);
  ctx.fillStyle = '#6366f1'; ctx.font = `500 ${sm}px Inter`;
  ctx.fillText('⌀ 3 mm', gx, labelY2);

  // ── Level 2: Square (mesh square with holes) ──
  const mx = colW * 1.5;
  const mSize = shapeR * 2;

  ctx.fillStyle = '#e0e7ff'; ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 2.5;
  roundRect(ctx, mx - mSize/2, cy - mSize/2, mSize, mSize, 6); ctx.fill(); ctx.stroke();

  const holeN = 4, holePad = mSize * 0.12, holeStep = (mSize - 2*holePad)/(holeN-1), holeR = holeStep * 0.26;
  ctx.fillStyle = '#f0f0f5'; ctx.strokeStyle = '#818cf8'; ctx.lineWidth = 1;
  for (let r = 0; r < holeN; r++) for (let c = 0; c < holeN; c++) {
    const hcx = mx - mSize/2 + holePad + c * holeStep;
    const hcy = cy - mSize/2 + holePad + r * holeStep;
    ctx.beginPath(); ctx.arc(hcx, hcy, holeR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }

  ctx.fillStyle = '#4338ca'; ctx.font = `800 ${md}px Inter`; ctx.textAlign = 'center';
  ctx.fillText('Square', mx, labelY1);
  ctx.fillStyle = '#6366f1'; ctx.font = `500 ${sm}px Inter`;
  ctx.fillText('~50 μm', mx, labelY2);

  // ── Level 3: Single Hole (zoomed in) ──
  const hx = colW * 2.5;

  // Carbon support background (same size as mSize)
  ctx.fillStyle = '#c7d2fe';
  roundRect(ctx, hx - mSize/2, cy - mSize/2, mSize, mSize, 8); ctx.fill();
  ctx.strokeStyle = '#818cf8'; ctx.lineWidth = 1;
  roundRect(ctx, hx - mSize/2, cy - mSize/2, mSize, mSize, 8); ctx.stroke();

  // Hole circle
  const holeCircR = shapeR * 0.8;
  ctx.fillStyle = '#dbeafe'; ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(hx, cy, holeCircR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(147,197,253,0.25)';
  ctx.beginPath(); ctx.arc(hx, cy, holeCircR * 0.88, 0, Math.PI * 2); ctx.fill();

  // Particles in ice
  ctx.fillStyle = '#1e40af';
  const particlePositions = [
    [0.15, -0.25], [-0.3, 0.1], [0.4, 0.2], [-0.15, -0.4],
    [0.3, -0.1], [-0.4, -0.2], [0.1, 0.35], [-0.2, 0.3],
    [0.35, -0.35], [-0.05, 0.05], [0.2, 0.1], [-0.3, -0.35]
  ];
  particlePositions.forEach(([px, py]) => {
    ctx.beginPath(); ctx.arc(hx + px * holeCircR, cy + py * holeCircR, 2.5, 0, Math.PI * 2); ctx.fill();
  });

  // Label: carbon foil
  ctx.fillStyle = '#64748b'; ctx.font = `500 ${xs}px Inter`; ctx.textAlign = 'center';
  ctx.fillText('Carbon foil', hx, cy - mSize/2 - 4);

  ctx.fillStyle = '#4338ca'; ctx.font = `800 ${md}px Inter`;
  ctx.fillText('Hole', hx, labelY1);
  ctx.fillStyle = '#6366f1'; ctx.font = `500 ${sm}px Inter`;
  ctx.fillText('1–2 μm', hx, labelY2);

  // ── Zoom arrows: two diverging dashed lines (expanding V shape) ──
  ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2.5; ctx.setLineDash([6, 4]);

  // Grid → Square
  const g2sFromX = gx + shapeR + 8;
  const g2sToX = mx - mSize/2 - 8;
  const gSpread = shapeR * 0.15;
  const sSpread = mSize / 2;
  ctx.beginPath(); ctx.moveTo(g2sFromX, cy - gSpread); ctx.lineTo(g2sToX, cy - sSpread); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(g2sFromX, cy + gSpread); ctx.lineTo(g2sToX, cy + sSpread); ctx.stroke();

  // Square → Hole
  const s2hFromX = mx + mSize/2 + 8;
  const s2hToX = hx - mSize/2 - 8;
  const sSpread2 = mSize * 0.12;
  const hSpread = mSize / 2;
  ctx.beginPath(); ctx.moveTo(s2hFromX, cy - sSpread2); ctx.lineTo(s2hToX, cy - hSpread); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s2hFromX, cy + sSpread2); ctx.lineTo(s2hToX, cy + hSpread); ctx.stroke();
  ctx.setLineDash([]);

  // ── Bottom Section: Material comparison ──
  const matY = zoomH + 8;
  const matH = h - matY - 4;

  // Section title
  ctx.fillStyle = '#4338ca'; ctx.font = `800 ${lg}px Inter`; ctx.textAlign = 'center';
  ctx.fillText('Grid Materials', w / 2, matY + lg);

  const tableY = matY + lg + 10;
  const tableH = matH - lg - 14;
  const tableW = w - pad * 2;
  const mColW = tableW / 3;
  const gap = 10;

  const materials = [
    {
      name: 'Copper (Cu)',
      color: '#b45309', bg: '#fef3c7', border: '#f59e0b',
      icon: 'Cu',
      items: [
        'Most commonly used',
        'Lowest cost',
        'Magnetic → problematic for tilt/tomography',
        'Standard choice for single particle analysis',
        'Quantifoil, C-Flat on Cu support'
      ]
    },
    {
      name: 'Gold (Au)',
      color: '#a16207', bg: '#fefce8', border: '#eab308',
      icon: 'Au',
      items: [
        'Non-magnetic (tilt-series compatible)',
        'Better thermal/electrical conductivity',
        'Reduces beam-induced motion',
        'UltrAuFoil: all-gold grid (foil + mesh)',
        'Higher cost, but increasingly popular'
      ]
    },
    {
      name: 'Support Films & Others',
      color: '#0f766e', bg: '#f0fdfa', border: '#5eead4',
      icon: 'layers',
      items: [
        'Graphene: reduces AWI, low background',
        'Graphene oxide: easier to apply',
        'Thin carbon: adds background noise',
        'Mo, Ni, Ti meshes also available',
        'Choice depends on sample needs'
      ]
    }
  ];

  const cardW = (tableW - gap * 2) / 3;
  const hdrH = Math.round(tableH * 0.22);

  materials.forEach((mat, mi) => {
    const x0 = pad + mi * (cardW + gap);

    // Card background
    ctx.fillStyle = mat.bg;
    roundRect(ctx, x0, tableY, cardW, tableH, 10); ctx.fill();
    ctx.strokeStyle = mat.border + '60'; ctx.lineWidth = 1.5;
    roundRect(ctx, x0, tableY, cardW, tableH, 10); ctx.stroke();

    // Header area
    ctx.fillStyle = mat.border + '20';
    roundRect(ctx, x0, tableY, cardW, hdrH, [10, 10, 0, 0]); ctx.fill();

    // Element symbol or custom icon
    const symFs = Math.round(hdrH * 0.5);
    ctx.fillStyle = mat.color; ctx.textAlign = 'center';
    if (mat.icon === 'layers') {
      // Draw 3 stacked horizontal bars (layered film icon)
      const lw = symFs * 1.3, lh = symFs * 0.18;
      const lcx = x0 + cardW / 2;
      const lcy = tableY + hdrH * 0.35;
      for (let li = 0; li < 3; li++) {
        const ly = lcy + li * (lh + symFs * 0.12);
        roundRect(ctx, lcx - lw/2, ly, lw, lh, 3); ctx.fill();
      }
    } else {
      ctx.font = `900 ${symFs}px Inter`;
      ctx.fillText(mat.icon, x0 + cardW / 2, tableY + hdrH * 0.45 + symFs * 0.3);
    }

    // Name
    ctx.fillStyle = mat.color; ctx.font = `700 ${sm}px Inter`;
    ctx.fillText(mat.name, x0 + cardW / 2, tableY + hdrH - sm * 0.3);

    // Items
    const itemY = tableY + hdrH + 8;
    const itemH = (tableH - hdrH - 12) / mat.items.length;
    ctx.textAlign = 'left';
    mat.items.forEach((item, ii) => {
      const iy = itemY + ii * itemH;
      ctx.fillStyle = mat.color; ctx.font = `700 ${xs}px Inter`;
      ctx.fillText('•', x0 + 10, iy + xs + 2);
      ctx.fillStyle = '#333'; ctx.font = `500 ${xs}px Inter`;
      ctx.fillText(item, x0 + 10 + xs * 0.8, iy + xs + 2);
    });
  });
}

window.addEventListener('DOMContentLoaded', draw);
window.addEventListener('resize', () => {
  clearTimeout(window._rt);
  window._rt = setTimeout(draw, 150);
});
</script>
</body>
</html>
