<!-- ============================================================
     SLIDE 5: Key Components of Modern Cryo-TEM (Feature Grid — bigger images)
     ============================================================ -->
<div class="bl-slide" data-n="5">
  <div class="bl-header">
    <div class="bl-chapter">Section 1: Cryo-EM Overview</div>
    <div class="bl-title">Key Components of Modern Cryo-TEM</div>
    <div class="bl-subtitle">What makes modern cryo-TEM different</div>
  </div>
  <div class="bl-content" style="top:260px;height:692px">
    <div class="bl-feature-grid">
      <div class="bl-feature-item">
        <div class="feature-pill">Autoloader</div>
        <div class="feature-img">
          <img src="../cryo-slides-img/s007_8_nocap.png" alt="Krios autoloader">
        </div>
        <div class="feature-body">
          <ul>
            <li>Maintains specimen at &minus;180 &deg;C (liquid nitrogen)</li>
            <li>Autoloader cassette holds up to 12 grids</li>
            <li>Preserves vacuum during grid exchange</li>
            <li>Enables unattended multi-grid collection</li>
          </ul>
        </div>
      </div>
      <div class="bl-feature-item">
        <div class="feature-pill">Direct Electron Detector</div>
        <div class="feature-img two-img">
          <img src="../cryo-slides-img/s007_6.png" alt="Indirect vs Direct detector">
          <div class="img-caption">Indirect (scintillator+CCD) vs Direct (CMOS)</div>
          <img src="../cryo-slides-img/s007_7.png" alt="DQE comparison">
          <div class="img-caption">DQE: Direct detector &gt; Film &gt; CCD</div>
        </div>
        <div class="feature-body">
          <ul>
            <li>No scintillator &mdash; direct electron counting on CMOS</li>
            <li>DQE &gt;2&times; over film/CCD at all frequencies</li>
            <li>Single electron counting mode maximizes SNR</li>
            <li>Movie-mode enables motion correction</li>
          </ul>
        </div>
      </div>
      <div class="bl-feature-item">
        <div class="feature-pill">Energy Filter</div>
        <div class="feature-img">
          <img src="../cryo-slides-img/s007_5.png" alt="Energy filter diagram">
        </div>
        <div class="feature-body">
          <ul>
            <li>Prism separates electrons by energy loss</li>
            <li>Energy slit selects zero-loss electrons</li>
            <li>Removes inelastic scattering &mdash; improves SNR</li>
            <li>Essential for thick specimens (&gt;50 nm)</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

      <li><strong>Catalase crystals</strong> &mdash; frozen hydrated diffraction</li>

    <div class="bl-subtitle">No purification. Just look into the cell.</div>
  </div>
  <div class="s19-layout">
    <div class="s19-img-col" id="imgToggle" onclick="toggleImg()" style="cursor:pointer; position:relative;">

    </div>
    <div class="s19-text-col">
      <div class="dream-statement">
        <div class="eyebrow">The Dream</div>
        <div class="body">
          Structural and cell biology provide <strong>complementary, yet unconnected visions</strong>
          of the inner workings of cells —
          cryo-EM and cryo-ET, as a connecting bridge, hold great promise to create
          <strong>structural depictions of macromolecules inside the cell itself.</strong>
        </div>
      </div>
      <div class="divider"></div>
      <div class="closing-box">
        <div class="title">Why not just purify?</div>
        <div class="body">
          cryo-EM still requires purification — visualization
          <em>outside of the natural context</em> in which macromolecules operate.
          Cell biologists image cells but always far from
          <em>the resolution at which chemistry can be understood.</em>
        </div>
      </div>
      <div class="divider"></div>
      <div class="reality-section">
        <div class="heading">How close are we?</div>
        <div class="status-group">
          <div class="status-row">

        <li><strong>AWI</strong> — Denaturation, preferred orientation, complex disassembly at the air-water interface</li>

      </ul>
    </div>

        <li><strong>Affinity grids</strong> — Ni-NTA, His-tag, streptavidin: capture target, bypass AWI</li>

      <div class="prob-title" style="color:#0072B2">Microscopy</div>
      <ul class="prob-list" style="font-size:16px;line-height:1.4">
        <li><strong>Slow &amp; manual</strong> — 5k–10k micrographs per structure; target selection and parameter setup need operator judgment</li>
        <li><strong>Low-dose noise</strong> — 30–60 e⁻/Å² yields noisy images; beam-induced motion further degrades signal</li>
        <li><strong>Optical aberrations</strong> — CTF, beam tilt, coma, spherical/chromatic aberration limit resolution</li>
        <li><strong>Grid dependent</strong> — Ice quality directly determines data quality</li>
        <li><strong>Cost</strong> — 300 keV: $4–10 M; weeks-long beam access queues</li>
      </ul>
    </div>
    <svg width="150" height="100" viewBox="0 0 150 100" style="flex-shrink:0;filter:drop-shadow(3px 5px 6px rgba(0,0,0,0.25))"><defs><linearGradient id="bl-arrow23" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#c0111a" stop-opacity="0"/><stop offset="50%" stop-color="#c0111a" stop-opacity="0.55"/><stop offset="100%" stop-color="#c0111a" stop-opacity="1"/></linearGradient></defs><path d="M0 22 L70 22 L70 0 L150 50 L70 100 L70 78 L0 78 Z" fill="url(#bl-arrow23)"/></svg>

      <ul class="prob-list" style="font-size:16px;line-height:1.4">
        <li><strong>Cold FEG</strong> — 0.3 eV energy spread → better SNR</li>
        <li><strong>Direct electron detectors</strong> — single-electron counting boosts SNR</li>
        <li><strong>AFIS</strong> — ~40 exposures per stage move; faster collection</li>
        <li><strong>Compact TEMs</strong> — 100–200 keV: lower-cost alternative to 300 keV</li>
        <li><strong>Automated screening</strong> — AI-assisted grid evaluation (e.g. Smart EPU)</li>
        <li><strong><a href="https://doi.org/10.1038/s41592-019-0552-2" target="_blank">Laser phase plate</a></strong> — in-focus phase contrast without electrostatic charging (Schwartz 2019)</li>

  <div class="bl-header">

    <div class="bl-title">Challenges and Limitations of Cryo-EM</div>

  </div>
  <div class="bl-content" style="top:300px;height:700px;display:flex;align-items:center;justify-content:center;gap:30px">

      <div class="prob-title" style="color:#c0392b">Data Processing</div>
      <ul class="prob-list" style="font-size:16px;line-height:1.4">
        <li><strong>Slow</strong> — Millions of particles; iterative 3D classification; GPU clusters needed</li>
        <li><strong>Manual (mostly)</strong> — 2D class selection subjective; parameter tuning at each step</li>
        <li><strong>Heterogeneity</strong> — Conformational and compositional variation complicate classification</li>
        <li><strong>Wasted particles</strong> — Valid particles including rare conformations routinely discarded alongside junk during classification</li>
        <li><strong>Data management</strong> — TB-scale data per day; storage and transfer increasingly a bottleneck</li>
      </ul>
    </div>
    <svg width="150" height="100" viewBox="0 0 150 100" style="flex-shrink:0;filter:drop-shadow(3px 5px 6px rgba(0,0,0,0.25))"><defs><linearGradient id="bl-arrow24" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#c0111a" stop-opacity="0"/><stop offset="50%" stop-color="#c0111a" stop-opacity="0.55"/><stop offset="100%" stop-color="#c0111a" stop-opacity="1"/></linearGradient></defs><path d="M0 22 L70 22 L70 0 L150 50 L70 100 L70 78 L0 78 Z" fill="url(#bl-arrow24)"/></svg>

      <ul class="prob-list" style="font-size:16px;line-height:1.4">
        <li><strong>End-to-end automation</strong> — collection-to-3D pipelines need almost no human input (<a href="https://guide.cryosparc.com/live/about-cryosparc-live" target="_blank">CryoSPARC Live</a>, <a href="https://relion.readthedocs.io/en/latest/Onthefly.html" target="_blank">RELION on-the-fly</a>, <a href="https://www.thermofisher.com/us/en/home/electron-microscopy/products/software-em-3d-vis/embedded-cryosparc-live.html" target="_blank">Smart EPU + Embedded CryoSPARC Live</a>) on AI-driven backbones (<a href="https://cryolo.readthedocs.io" target="_blank">crYOLO</a>, <a href="https://github.com/tbepler/topaz" target="_blank">TOPAZ</a>, <a href="https://github.com/3dem/model-angelo" target="_blank">ModelAngelo</a>)</li>
        <li><strong>Cloud-native infrastructure</strong> — elastic storage &amp; compute relieve facility bottlenecks (<a href="https://cryocloud.io/" target="_blank">CryoCloud</a>, <a href="https://aws.amazon.com/blogs/hpc/scalable-cryo-em-on-aws-parallel-computing-service-pcs/" target="_blank">AWS pipelines</a>, <a href="https://doi.org/10.1038/s42003-024-07031-6" target="_blank">GoToCloud</a>)</li>
        <li><strong>Rescuing discarded particles &amp; objective validation</strong> — continuous heterogeneity methods (<a href="https://doi.org/10.1016/j.jsb.2021.107702" target="_blank">3DVA</a>, <a href="https://cryodrgn.cs.princeton.edu/" target="_blank">cryoDRGN</a>, <a href="https://doi.org/10.1038/s41592-024-02377-5" target="_blank">DynaMight</a> in RELION 5) recover rare states; <a href="https://github.com/fraser-lab/EMRinger" target="_blank">EMRinger</a> and <a href="https://www.emdataresource.org/news/q_score_announce.html" target="_blank">Q-score</a> (now in wwPDB reports) standardize quality</li>
      </ul>

  const MILESTONES = [
    {year:2013, label:'Resolution Revolution', color:'#7c3aed', pause:1600},
    {year:2017, label:'Nobel Prize', color:'#d97706', pause:2000}
  ];
  const COLORS = {xray:'#e74c3c', em:'#2563eb', nmr:'#16a34a'};
  let canvas, ctx, W, H;
  const margin = {top:60, right:110, bottom:100, left:150};
  let plotW, plotH;
  let totalFrames;
  let started = false, finished = false;
  const SPEED = 8;
  const maxY = 13000;
  let currentProgress = 0, milestoneIdx = 0, pauseRemaining = 0;

  function init(){
    canvas = document.getElementById('pdb-chart');
    if(!canvas) return false;
    const dpr = window.devicePixelRatio || 1;
    const parent = canvas.parentElement;
    W = parent.clientWidth || parent.offsetWidth;
    H = parent.clientHeight || parent.offsetHeight;
    if(!W || !H) return false;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    plotW = W - margin.left - margin.right;
    plotH = H - margin.top - margin.bottom;
    totalFrames = (DATA.years.length - 1) * SPEED;
    return true;
  }

  function xPos(i){ return margin.left + (i / (DATA.years.length-1)) * plotW; }
  function yPos(v){ return margin.top + plotH - (v / maxY) * plotH; }

  function drawAxes(){
    ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1;
    for(let v=0; v<=maxY; v+=2000){
      const y = yPos(v);
      ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(W-margin.right, y); ctx.stroke();
      ctx.fillStyle = '#6b7280'; ctx.font = '500 16px "Helvetica Neue",Arial,sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(v.toLocaleString(), margin.left-12, y);
    }
    const milestoneYears = [2013, 2017];
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    DATA.years.forEach((yr,i) => {
      if(yr%5===0 || milestoneYears.includes(yr)){
        const x = xPos(i);
        const isMilestone = milestoneYears.includes(yr);
        ctx.fillStyle = isMilestone ? (yr===2013 ? '#7c3aed' : '#d97706') : '#6b7280';
        ctx.font = isMilestone ? 'bold 15px "Helvetica Neue",Arial,sans-serif' : '500 15px "Helvetica Neue",Arial,sans-serif';
        ctx.fillText(yr, x, margin.top+plotH+10);
        if(!isMilestone){ ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, margin.top+plotH); ctx.stroke(); }
      }
    });
    ctx.fillStyle = '#374151'; ctx.font = '700 22px "Helvetica Neue",Arial,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Year', margin.left+plotW/2, margin.top+plotH+50);
    ctx.save(); ctx.translate(42, margin.top+plotH/2); ctx.rotate(-Math.PI/2);
    ctx.fillText('Structures / Year', 0, 0); ctx.restore();
  }

  function drawLine(data, color, progress, lineWidth){
    const n = DATA.years.length;
    const exactIdx = progress * (n-1);
    const lastFull = Math.floor(exactIdx);
    const frac = exactIdx - lastFull;
    ctx.strokeStyle = color; ctx.lineWidth = lineWidth || 3;
    ctx.beginPath();
    for(let i=0; i<=lastFull && i<n; i++){
      const x=xPos(i), y=yPos(data[i]);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    if(frac>0 && lastFull+1<n){
      const x=xPos(lastFull)+frac*(xPos(lastFull+1)-xPos(lastFull));
      const y=yPos(data[lastFull])+frac*(yPos(data[lastFull+1])-yPos(data[lastFull]));
      ctx.lineTo(x,y);
    }
    ctx.stroke();
    const dotX=xPos(lastFull)+frac*(lastFull+1<n?xPos(lastFull+1)-xPos(lastFull):0);
    const dotY=yPos(data[lastFull])+frac*(lastFull+1<n?yPos(data[lastFull+1])-yPos(data[lastFull]):0);
    ctx.fillStyle=color; ctx.beginPath(); ctx.arc(frac>0?dotX:xPos(lastFull), frac>0?dotY:yPos(data[lastFull]), 4, 0, Math.PI*2); ctx.fill();
  }

  function drawFill(data, color, progress){
    const n=DATA.years.length, exactIdx=progress*(n-1), lastFull=Math.floor(exactIdx), frac=exactIdx-lastFull;
    ctx.fillStyle=color; ctx.globalAlpha=0.08;
    ctx.beginPath(); ctx.moveTo(xPos(0), yPos(0));
    for(let i=0; i<=lastFull && i<n; i++) ctx.lineTo(xPos(i), yPos(data[i]));
    if(frac>0 && lastFull+1<n){
      const x=xPos(lastFull)+frac*(xPos(lastFull+1)-xPos(lastFull));
      const y=yPos(data[lastFull])+frac*(yPos(data[lastFull+1])-yPos(data[lastFull]));
      ctx.lineTo(x,y); ctx.lineTo(x, yPos(0));
    } else { ctx.lineTo(xPos(lastFull), yPos(0)); }
    ctx.closePath(); ctx.fill(); ctx.globalAlpha=1;
  }

  function drawLegend(){
    const lx=margin.left+10, ly=margin.top+10;
    const items=[{label:'X-ray Crystallography',color:COLORS.xray},{label:'Cryo-EM',color:COLORS.em},{label:'NMR',color:COLORS.nmr}];
    ctx.font='600 15px "Helvetica Neue",Arial,sans-serif';
    ctx.fillStyle='#e8e8e8'; ctx.strokeStyle='#d1d5db'; ctx.lineWidth=1;
    const bw=230, bh=items.length*26+14;
    ctx.fillRect(lx,ly,bw,bh); ctx.strokeRect(lx,ly,bw,bh);
    items.forEach((item,i)=>{
      const iy=ly+24+i*26;
      ctx.fillStyle=item.color; ctx.fillRect(lx+10,iy-5,22,3.5);
      ctx.beginPath(); ctx.arc(lx+21,iy-3.5,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#374151'; ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(item.label, lx+42, iy-3);
    });
  }

  function drawMilestone(m, progress){
    const idx=DATA.years.indexOf(m.year);
    const mProgress=idx/(DATA.years.length-1);
    if(progress<mProgress) return;
    const x=xPos(idx);
    const fadeProgress=Math.min(1,(progress-mProgress)/0.03);
    ctx.save(); ctx.globalAlpha=0.35*fadeProgress;
    ctx.strokeStyle=m.color; ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(x,margin.top); ctx.lineTo(x,margin.top+plotH); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }

  function drawEndLabels(progress){
    if(progress<1) return;
    const n=DATA.years.length, lastX=xPos(n-1);
    ctx.fillStyle=COLORS.xray; ctx.font='bold 18px "Helvetica Neue",Arial,sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('10,085', lastX+12, yPos(DATA.xray[n-1]));
    ctx.fillStyle=COLORS.em; ctx.fillText('7,240', lastX+12, yPos(DATA.em[n-1]));
  }

  function syncCards(progress){
    const p2013=DATA.years.indexOf(2013)/(DATA.years.length-1);
    const p2017=DATA.years.indexOf(2017)/(DATA.years.length-1);
    const c1=document.getElementById('s14-card-2013');
    const c2=document.getElementById('s14-card-2017');
    const c3=document.getElementById('s14-card-2025');
    if(c1) c1.style.opacity=progress>=p2013?'1':'0';
    if(c2) c2.style.opacity=progress>=p2017?'1':'0';
    if(c3) c3.style.opacity=progress>=1?'1':'0';
  }

  function hideCards(){
    ['s14-card-2013','s14-card-2017','s14-card-2025'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.style.opacity='0';
    });
  }

  function animate(){
    if(!started||finished) return;
    ctx.clearRect(0,0,W,H);
    drawAxes();
    if(pauseRemaining>0){
      pauseRemaining-=16;
      drawFill(DATA.xray,COLORS.xray,currentProgress); drawFill(DATA.em,COLORS.em,currentProgress);
      drawLine(DATA.xray,COLORS.xray,currentProgress,3); drawLine(DATA.em,COLORS.em,currentProgress,3); drawLine(DATA.nmr,COLORS.nmr,currentProgress,2);
      MILESTONES.forEach(m=>drawMilestone(m,currentProgress));
      drawLegend(); if(currentProgress>=1) drawEndLabels(currentProgress);
      requestAnimationFrame(animate); return;
    }
    const step=1/totalFrames;
    currentProgress=Math.min(1,currentProgress+step);
    if(milestoneIdx<MILESTONES.length){
      const m=MILESTONES[milestoneIdx];
      const mProg=DATA.years.indexOf(m.year)/(DATA.years.length-1);
      if(currentProgress>=mProg && currentProgress-step<mProg){ currentProgress=mProg; pauseRemaining=m.pause; milestoneIdx++; }
    }
    drawFill(DATA.xray,COLORS.xray,currentProgress); drawFill(DATA.em,COLORS.em,currentProgress);
    drawLine(DATA.xray,COLORS.xray,currentProgress,3); drawLine(DATA.em,COLORS.em,currentProgress,3); drawLine(DATA.nmr,COLORS.nmr,currentProgress,2);
    MILESTONES.forEach(m=>drawMilestone(m,currentProgress));
    drawLegend(); if(currentProgress>=1) drawEndLabels(currentProgress);
    syncCards(currentProgress);
    if(currentProgress<1||pauseRemaining>0){ requestAnimationFrame(animate); } else { finished=true; }
  }

  function startAnimation(){
    if(started) return;
    if(!init()) return;
    hideCards();
    ctx.clearRect(0,0,W,H); drawAxes(); drawLegend();
    started=true; finished=false; currentProgress=0; milestoneIdx=0; pauseRemaining=0;
    setTimeout(()=>{ requestAnimationFrame(animate); }, 1000);
  }

  function resetAnimation(){
    started=false; finished=false; currentProgress=0; milestoneIdx=0; pauseRemaining=0;
    if(!init()) return;
    hideCards(); ctx.clearRect(0,0,W,H); drawAxes(); drawLegend();
  }

  const obs = new MutationObserver(()=>{
    const s14=document.querySelector('[data-n="14"]');
    if(!s14) return;
    if(s14.classList.contains('active') && !started){ setTimeout(startAnimation, 300); }
    else if(!s14.classList.contains('active') && started){ resetAnimation(); }
  });
  document.querySelectorAll('.bl-slide').forEach(s=>obs.observe(s,{attributes:true,attributeFilter:['class']}));
  if(document.querySelector('[data-n="14"].active')) setTimeout(startAnimation, 300);
})();

/* Slide 20: Interactive pill bar */
const s20Descs = {
  1: { stage:'Stage 1', title:'Sample Preparation', summary:'Produce a pure, stable protein sample suitable for cryo-EM grid preparation.', items:['Protein expression: E. coli, baculovirus, or mammalian cells','Affinity purification + size-exclusion chromatography (SEC)','Target: homogeneous, monodisperse sample at 1–5 mg/mL','Biochemical validation: SDS-PAGE, negative stain TEM','Buffer optimization: pH, salt, detergent (membrane proteins)','Mass photometry or DLS for size distribution check'] },
  2: { stage:'Stage 2', title:'Grid Preparation', summary:'Rapidly freeze sample into vitreous ice; verify grid quality before data collection.', items:['Apply 3–5 µL sample to glow-discharged holey carbon grid','Blot to thin film, then plunge-freeze in liquid ethane (−183°C)','Vitrification preserves native hydrated structure','Optimize blotting parameters: force, time, and humidity','Grid screening: verify ice thickness, particle distribution, and coverage','Store and transfer grids under liquid nitrogen'] },
  3: { stage:'Stage 3', title:'Data Collection', summary:'Acquire thousands of micrograph movies under automated cryo-EM conditions.', items:['300 kV cryo-TEM (e.g., Titan Krios) with direct electron detector','Automated acquisition: 1,000–5,000 movies per session','Dose: ~40–60 e⁻/Å², defocus: −0.5 to −2.0 µm','Pixel size: 0.5–1.0 Å/px depending on target resolution','Real-time monitoring with EPU or SerialEM','On-the-fly preprocessing to assess data quality'] },
  4: { stage:'Stage 4', title:'Image Processing', summary:'Extract and classify particles to reconstruct a 3D electron density map.', items:['Motion correction: MotionCor2, RELION built-in','CTF estimation: CTFFIND4','Particle picking: crYOLO, Topaz (neural network) or template-based','2D/3D classification & refinement: RELION, cryoSPARC, cisTEM, EMAN2','CTF refinement + Bayesian polishing (RELION 3.1+)','Resolution assessment by gold-standard FSC'] },
  5: { stage:'Stage 5', title:'Model Building', summary:'Interpret the density map to build, refine, and deposit an atomic model.', items:['Map sharpening: RELION postprocessing','Initial fitting & model building: Coot, UCSF ChimeraX, ModelAngelo','Real-space refinement: PHENIX, REFMAC5 (CCP-EM), ISOLDE','Geometry validation: MolProbity, EMRinger, Q-score','Resolution-dependent features: side chains at 2–3 Å','Deposit map + model to EMDB / PDB'] }
};
const s20HlMap = { 1:['s20-hl-1'], 2:['s20-hl-2'], 3:['s20-hl-3'], 4:['s20-hl-4'], 5:['s20-hl-5'] };
let s20ActiveStep = null;
function showDesc(n) {
  const panel = document.getElementById('s20-desc');
  const pills = document.querySelectorAll('.s20-pill');
  if (s20ActiveStep === n) {
    panel.classList.remove('visible');
    pills[n-1].classList.remove('active');
    document.querySelectorAll('.s20-hl').forEach(h => h.classList.remove('active'));
    s20ActiveStep = null; return;
  }
  s20ActiveStep = n;
  pills.forEach(p => p.classList.remove('active'));
  pills[n-1].classList.add('active');
  document.querySelectorAll('.s20-hl').forEach(h => h.classList.remove('active'));
  s20HlMap[n].forEach(id => document.getElementById(id).classList.add('active'));
  const d = s20Descs[n];
  document.getElementById('s20-desc-stage').textContent = d.stage;
  document.getElementById('s20-desc-title').textContent = d.title;
  document.getElementById('s20-desc-summary').textContent = d.summary;
  const ul = document.getElementById('s20-desc-list');
  ul.innerHTML = d.items.map(i => `<li>${i}</li>`).join('');
  panel.classList.add('visible');
}
</script>
